<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 法考学习追踪器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        }
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 380px;
            margin: 20px;
        }
        .login-box h1 {
            text-align: center;
            color: #1a1a2e;
            font-size: 1.5rem;
            margin-bottom: 30px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        .input-group label {
            display: block;
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 8px;
        }
        .input-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        .input-group input:focus {
            outline: none;
            border-color: #4a90d9;
        }
        .login-btn {
            width: 100%;
            padding: 14px;
            background: #4a90d9;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.3s;
        }
        .login-btn:hover {
            background: #3a7bc8;
        }
        .error {
            color: #e74c3c;
            text-align: center;
            margin-top: 15px;
            font-size: 0.9rem;
            display: none;
        }
        .error.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>📚 法考学习追踪器</h1>
        <form id="loginForm">
            <div class="input-group">
                <label>请输入访问密码</label>
                <input type="password" id="password" placeholder="输入密码后按回车" autocomplete="off">
            </div>
            <button type="submit" class="login-btn">进入学习</button>
        </form>
        <p class="error" id="error">密码错误，请重试</p>
    </div>

    <script>
        // 设置密码（后续可以改成动态配置）
        const CORRECT_PASSWORD = 'jiege2026';

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const pwd = document.getElementById('password').value;
            
            if (pwd === CORRECT_PASSWORD) {
                // 设置登录状态，7天有效
                const expire = new Date();
                expire.setDate(expire.getDate() + 7);
                document.cookie = `lawtracker_auth=ok; expires=${expire.toUTCString()}; path=/`;
                window.location.href = 'index.html';
            } else {
                document.getElementById('error').classList.add('show');
                document.getElementById('password').value = '';
            }
        });

        // 检查是否已登录
        if (document.cookie.includes('lawtracker_auth=ok')) {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
